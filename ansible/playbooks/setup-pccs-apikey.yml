---
# Ansible playbook to configure PCCS with Intel API key
# Usage: ansible-playbook -i inventory/hosts.yml playbooks/setup-pccs-apikey.yml \
#          -e "intel_api_key=YOUR_API_KEY"
#
# Prerequisites:
#   - TDX setup completed with attestation enabled (TDX_SETUP_ATTESTATION=1)
#   - PCCS service installed
#   - Intel API key from https://api.portal.trustedservices.intel.com/
#
# This playbook:
# - Configures PCCS with Intel API key
# - Restarts PCCS and QGS services
# - Verifies attestation services are working
# - Tests PCK certificate retrieval

- name: Configure PCCS with Intel API Key
  hosts: dstack_servers
  become: true
  vars:
    pccs_config_path: "/opt/intel/sgx-dcap-pccs/config/default.json"
    qcnl_config_path: "/etc/sgx_default_qcnl.conf"

  tasks:
    - name: Check if intel_api_key is provided
      ansible.builtin.fail:
        msg: |
          Intel API key is required.

          Usage:
            ansible-playbook -i inventory/hosts.yml playbooks/setup-pccs-apikey.yml \
              -e "intel_api_key=YOUR_API_KEY"

          Get a FREE API key at:
            https://api.portal.trustedservices.intel.com/
      when: intel_api_key is not defined or intel_api_key == ""

    # =========================================================================
    # VERIFY PREREQUISITES
    # =========================================================================
    - name: Check PCCS is installed
      ansible.builtin.stat:
        path: "{{ pccs_config_path }}"
      register: pccs_config_check

    - name: Fail if PCCS not installed
      ansible.builtin.fail:
        msg: |
          PCCS is not installed. Configuration file not found at {{ pccs_config_path }}

          Install PCCS by running TDX setup with attestation enabled:
            cd ~/tdx
            sed -i 's/TDX_SETUP_ATTESTATION=0/TDX_SETUP_ATTESTATION=1/' setup-tdx-config
            sudo ./setup-tdx-host.sh
      when: not pccs_config_check.stat.exists

    - name: Check PCCS service exists
      ansible.builtin.command:
        cmd: systemctl list-unit-files pccs.service
      register: pccs_service_check
      changed_when: false
      failed_when: false

    - name: Fail if PCCS service not found
      ansible.builtin.fail:
        msg: |
          PCCS service not found.

          Install PCCS by running TDX setup with attestation enabled.
      when: "'pccs.service' not in pccs_service_check.stdout"

    # =========================================================================
    # READ CURRENT CONFIG
    # =========================================================================
    - name: Read current PCCS configuration
      ansible.builtin.slurp:
        src: "{{ pccs_config_path }}"
      register: pccs_config_raw

    - name: Parse PCCS configuration
      ansible.builtin.set_fact:
        pccs_config: "{{ pccs_config_raw.content | b64decode | from_json }}"

    - name: Check if API key is already configured
      ansible.builtin.set_fact:
        api_key_configured: "{{ pccs_config.ApiKey | default('') | length > 10 }}"

    - name: Display current configuration status
      ansible.builtin.debug:
        msg:
          - "Current PCCS Configuration:"
          - "  API Key Configured: {{ 'Yes' if api_key_configured else 'No (empty)' }}"
          - "  PCCS Port: {{ pccs_config.port | default('8081') }}"
          - "  Intel API URL: {{ pccs_config.uri | default('not set') }}"

    # =========================================================================
    # UPDATE PCCS CONFIGURATION
    # =========================================================================
    - name: Update PCCS configuration with API key
      ansible.builtin.copy:
        dest: "{{ pccs_config_path }}"
        content: "{{ pccs_config | combine({'ApiKey': intel_api_key}) | to_nice_json }}"
        mode: '0640'
        backup: yes
      notify:
        - Restart PCCS
        - Restart QGS

    # =========================================================================
    # VERIFY QCNL CONFIGURATION
    # =========================================================================
    - name: Check QCNL configuration exists
      ansible.builtin.stat:
        path: "{{ qcnl_config_path }}"
      register: qcnl_config_check

    - name: Read QCNL configuration
      ansible.builtin.slurp:
        src: "{{ qcnl_config_path }}"
      register: qcnl_config_raw
      when: qcnl_config_check.stat.exists

    - name: Parse QCNL configuration
      ansible.builtin.set_fact:
        qcnl_config: "{{ qcnl_config_raw.content | b64decode | from_json }}"
      when: qcnl_config_check.stat.exists

    - name: Check QCNL points to local PCCS
      ansible.builtin.set_fact:
        qcnl_uses_local_pccs: "{{ 'localhost' in (qcnl_config.pccs_url | default('')) or '127.0.0.1' in (qcnl_config.pccs_url | default('')) }}"
      when: qcnl_config_check.stat.exists

    - name: Update QCNL to use local PCCS
      ansible.builtin.copy:
        dest: "{{ qcnl_config_path }}"
        content: |
          {
            "pccs_url": "https://localhost:8081/sgx/certification/v4/",
            "use_secure_cert": false,
            "retry_times": 6,
            "retry_delay": 10,
            "pck_cache_expire_hours": 168,
            "verify_collateral_cache_expire_hours": 168,
            "local_cache_only": false
          }
        mode: '0644'
      when: qcnl_config_check.stat.exists and not (qcnl_uses_local_pccs | default(false))
      notify:
        - Restart QGS

    # =========================================================================
    # RESTART SERVICES
    # =========================================================================
    - name: Flush handlers to restart services
      ansible.builtin.meta: flush_handlers

    - name: Wait for PCCS to start
      ansible.builtin.wait_for:
        host: localhost
        port: 8081
        timeout: 30
        state: started

    # =========================================================================
    # VERIFY CONFIGURATION
    # =========================================================================
    - name: Check PCCS service status
      ansible.builtin.systemd:
        name: pccs
      register: pccs_status

    - name: Check QGS service status
      ansible.builtin.systemd:
        name: qgsd
      register: qgs_status

    - name: Test PCCS root CA CRL endpoint
      ansible.builtin.uri:
        url: "http://localhost:8081/sgx/certification/v4/rootcacrl"
        method: GET
        return_content: no
        status_code: [200, 404]
        timeout: 10
      register: pccs_test
      failed_when: false

    - name: Run PCK ID retrieval to populate cache
      ansible.builtin.command:
        cmd: PCKIDRetrievalTool
      register: pckid_result
      changed_when: false
      failed_when: false

    - name: Display PCK ID retrieval result
      ansible.builtin.debug:
        msg: "{{ pckid_result.stdout_lines | default(['No output']) }}"
      when: pckid_result.rc == 0

    # =========================================================================
    # SUMMARY
    # =========================================================================
    - name: Display configuration summary
      ansible.builtin.debug:
        msg:
          - "============================================"
          - "PCCS Configuration Complete"
          - "============================================"
          - ""
          - "Services:"
          - "  PCCS: {{ pccs_status.status.ActiveState }}"
          - "  QGS:  {{ qgs_status.status.ActiveState }}"
          - ""
          - "Configuration:"
          - "  PCCS Config: {{ pccs_config_path }}"
          - "  QCNL Config: {{ qcnl_config_path }}"
          - "  API Key: {{ intel_api_key[:8] }}...{{ intel_api_key[-4:] }} (masked)"
          - ""
          - "Test Results:"
          - "  PCCS API: {{ 'Responding' if pccs_test.status | default(0) == 200 else 'Not responding (may need time to initialize)' }}"
          - "  PCK Retrieval: {{ 'Success' if pckid_result.rc | default(1) == 0 else 'Check logs for details' }}"
          - ""
          - "Verification Commands:"
          - "  Check PCCS logs: sudo journalctl -u pccs -n 50"
          - "  Check QGS logs:  sudo journalctl -u qgsd -n 50"
          - "  Test PCCS API:   curl http://localhost:8081/sgx/certification/v4/rootcacrl"
          - ""
          - "Next Steps:"
          - "  Continue with KMS Build & Configuration:"
          - "    ansible-playbook playbooks/build-kms.yml"

    - name: Fail if services not running
      ansible.builtin.fail:
        msg: |
          PCCS or QGS service is not running.

          Check logs:
            sudo journalctl -u pccs -n 50
            sudo journalctl -u qgsd -n 50
      when: pccs_status.status.ActiveState != 'active' or qgs_status.status.ActiveState != 'active'

  handlers:
    - name: Restart PCCS
      ansible.builtin.systemd:
        name: pccs
        state: restarted

    - name: Restart QGS
      ansible.builtin.systemd:
        name: qgsd
        state: restarted
